# Workflow for building and deploying Wanaku website + docs
#
name: Deploy Wanaku Website

on:
  # Runs on pushes targeting the `main` branch. Change this to `master` if you're
  # using the `master` branch as the default branch.
  push:
    branches: [main]
  schedule:
    # Every 45th minute every 3 hours during working days
    - cron: '45 */3 * * 1-5'
    # Every 8 hours during weekends
    - cron: '30 */6 * * 6,0'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:


# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read


# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Not needed if lastUpdated is not enabled
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prepare the build
        run: |
          make fetch
      - name: Build with VitePress
        run: make docs
      - name: Upload site artifact
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          path: dist
          name: site
      - name: Upload get-wanaku.sh artifact
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          path: get-wanaku.sh
          name: get-wanaku


  # Deployment job
  deploy:
    environment:
      name: wanaku-website
      url: http://wanaku.ai
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site
      - name: Download get-wanaku.sh artifact
        uses: actions/download-artifact@v4
        with:
          name: get-wanaku
          path: site
      - name: Configure SSH
        env:
          WEBSITE_HOST: ${{ secrets.WEBSITE_HOST }}
          WANAKU_KEY: ${{ secrets.WANAKU_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$WANAKU_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$WEBSITE_HOST" >> ~/.ssh/known_hosts
      - name: Deploy site via rsync
        env:
          WEBSITE_HOST: ${{ secrets.WEBSITE_HOST }}
          WEBSITE_USERNAME: ${{ secrets.WEBSITE_USERNAME }}
        run: |
          rsync -avz --delete \
            --filter="merge .github/rsync-filter.rules" \
            -e "ssh -i ~/.ssh/id_ed25519" \
            site/ "${WEBSITE_USERNAME}@${WEBSITE_HOST}:${WEBSITE_HOST}/"
